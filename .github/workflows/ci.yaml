name: CI Pipeline
on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Run tests
        run: pytest -v > test-results.txt
      - name: CML report
        uses: iterative/cml@v0.19.0
        with:
          report-path: test-results.txt
          repo-token: ${{ secrets.GITHUB_TOKEN }}